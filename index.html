<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Folheto Litúrgico</title>
<link href="https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500&family=Cinzel:wght@400;600;700&family=Lato:ital,wght@0,300;0,400;0,700;1,300;1,400&display=swap" rel="stylesheet">
<style>
  :root {
    --dourado: #C9A84C;
    --creme: #faf7f0;
    --creme-escuro: #f2ecdf;
    --texto: #2c1810;
    --vermelho-lit: #C0392B;
    --pad: clamp(1rem, 4vw, 1.8rem);
  }

  * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }

  html { font-size: 16px; }

  body {
    font-family:'Lato',sans-serif;
    background:#111008;
    min-height:100vh;
    /* evita zoom acidental no iOS ao tocar em inputs */
    -webkit-text-size-adjust: 100%;
  }

  #app { max-width:820px; margin:0 auto; }

  /* ── LOADING ── */
  #loading {
    display:flex; flex-direction:column;
    align-items:center; justify-content:center;
    min-height:100vh; gap:1.2rem; padding:2rem;
  }
  .spin { font-size:3rem; color:var(--dourado); animation:glow 2s ease-in-out infinite; }
  @keyframes glow { 0%,100%{opacity:.3;transform:scale(1)} 50%{opacity:1;transform:scale(1.08)} }
  #loading p { font-family:'EB Garamond',serif; font-style:italic; color:rgba(201,168,76,.6); font-size:1rem; text-align:center; }

  /* ── HEADER ── */
  .header {
    background:linear-gradient(180deg,#0d0500 0%,#1e0900 70%,#2a1000 100%);
    border-bottom:3px solid var(--dourado);
    padding:clamp(1.4rem,5vw,2.2rem) var(--pad) clamp(1.2rem,4vw,1.8rem);
    text-align:center;
    position:relative; overflow:hidden;
  }
  .header::after {
    content:''; position:absolute; inset:0;
    background:radial-gradient(ellipse at 50% 0%,rgba(201,168,76,.1) 0%,transparent 65%);
    pointer-events:none;
  }
  .season-stripe { height:5px; border-radius:3px; margin-bottom:clamp(1rem,4vw,1.6rem); transition:background .6s; }

  .chi-rho {
    font-size:clamp(2rem,8vw,2.6rem); color:var(--dourado); line-height:1;
    margin-bottom:.5rem;
    filter:drop-shadow(0 0 12px rgba(201,168,76,.35)); position:relative; z-index:1;
  }
  .header-liturgia {
    font-family:'Cinzel',serif; font-size:clamp(.75rem,3.5vw,1rem); font-weight:600;
    color:var(--dourado); letter-spacing:.12em; text-transform:uppercase;
    position:relative; z-index:1; margin-bottom:.3rem;
    /* quebra de linha em telas estreitas */
    word-break:break-word; hyphens:auto;
  }
  .header-data {
    font-family:'EB Garamond',serif; font-size:clamp(.9rem,3.5vw,1.05rem);
    color:rgba(201,168,76,.65); font-style:italic;
    position:relative; z-index:1; margin-bottom:.9rem;
  }
  .header-badges {
    display:flex; flex-wrap:wrap; justify-content:center;
    gap:.4rem; position:relative; z-index:1;
  }
  .badge {
    padding:.22rem .75rem; border-radius:20px;
    font-size:clamp(.6rem,2.5vw,.68rem);
    letter-spacing:.06em; text-transform:uppercase;
    font-family:'Lato',sans-serif; font-weight:700; border:1px solid;
    /* nunca ultrapassa a tela */
    max-width:calc(100vw - 2rem); word-break:break-word;
  }

  /* ── TABS ── */
  .tabs {
    display:flex; background:#1a0800;
    border-bottom:2px solid var(--dourado);
    overflow-x:auto; scrollbar-width:none;
    /* snap suave no mobile */
    scroll-snap-type:x mandatory;
    -webkit-overflow-scrolling:touch;
  }
  .tabs::-webkit-scrollbar { display:none; }
  .tab {
    flex:1 0 auto; /* cresce igualmente, nunca colapsa */
    min-width:0;
    padding:.8rem clamp(.6rem,3vw,1.4rem);
    font-family:'Cinzel',serif; font-size:clamp(.6rem,2.8vw,.68rem); font-weight:600;
    letter-spacing:.08em; text-transform:uppercase;
    color:rgba(201,168,76,.45); cursor:pointer;
    border-bottom:2px solid transparent; margin-bottom:-2px;
    transition:all .2s; white-space:nowrap;
    scroll-snap-align:start;
    text-align:center;
    /* área de toque mínima 44px */
    min-height:44px; display:flex; align-items:center; justify-content:center;
  }
  .tab:hover { color:rgba(201,168,76,.8); }
  .tab.active { color:var(--dourado); border-bottom-color:var(--dourado); }
  .tab-panel { display:none; }
  .tab-panel.active { display:block; }

  /* ── CONTENT ── */
  .content {
    background:var(--creme);
    border-left:3px solid var(--dourado);
    border-right:3px solid var(--dourado);
    border-bottom:3px solid var(--dourado);
  }

  /* ── ACCORDION ── */
  .section { border-bottom:1px solid rgba(0,0,0,.09); }
  .sec-head {
    display:flex; align-items:center; gap:.6rem;
    padding:.9rem var(--pad);
    cursor:pointer; transition:background .18s;
    /* área de toque confortável */
    min-height:52px;
  }
  .sec-head:active { background:rgba(201,168,76,.1); }
  @media(hover:hover){ .sec-head:hover { background:rgba(201,168,76,.06); } }

  .sec-num {
    width:28px; height:28px; border-radius:50%;
    background:var(--dourado); flex-shrink:0;
    display:flex; align-items:center; justify-content:center;
    font-family:'Cinzel',serif; font-size:.68rem; font-weight:700; color:#fff;
  }
  .sec-title {
    font-family:'Cinzel',serif; font-size:clamp(.72rem,3vw,.78rem); font-weight:600;
    color:#5c3d0a; letter-spacing:.1em; text-transform:uppercase; flex:1;
    word-break:break-word;
  }
  .sec-ref {
    font-family:'EB Garamond',serif; font-size:clamp(.75rem,3vw,.82rem);
    color:rgba(92,61,10,.5); font-style:italic;
    /* some em telas muito pequenas para não apertar */
    white-space:nowrap; overflow:hidden; text-overflow:ellipsis; max-width:30vw;
  }
  .chevron {
    width:9px; height:9px; flex-shrink:0;
    border-right:2px solid var(--dourado); border-bottom:2px solid var(--dourado);
    transform:rotate(45deg); margin-top:-4px; transition:transform .25s;
  }
  .chevron.open { transform:rotate(-135deg); margin-top:4px; }

  .sec-body { display:none; padding:0 var(--pad) 1.5rem; }
  .sec-body.open { display:block; }

  /* ── TEXTOS ── */
  .leitura-titulo {
    font-family:'EB Garamond',serif; font-size:clamp(.82rem,3vw,.88rem); font-style:italic;
    color:#8a6530; border-bottom:1px solid rgba(201,168,76,.3);
    padding-bottom:.6rem; margin-bottom:1rem; word-break:break-word;
  }
  .leitura-texto {
    font-family:'EB Garamond',serif;
    font-size:clamp(1rem,4vw,1.1rem); line-height:1.9;
    color:var(--texto); white-space:pre-line;
    /* evita palavras longas quebrarem o layout */
    overflow-wrap:break-word; word-break:break-word;
  }
  sup.vnum {
    font-size:.58rem; font-family:'Lato',sans-serif;
    font-weight:700; color:var(--vermelho-lit);
    vertical-align:super; margin-right:1px;
  }
  .refrao {
    background:linear-gradient(135deg,#fdf4e3,#f5e9cc);
    border-left:3px solid var(--dourado); border-radius:0 6px 6px 0;
    padding:.75rem 1rem; margin:.8rem 0 1rem;
    font-family:'EB Garamond',serif; font-size:clamp(.98rem,3.5vw,1.05rem);
    font-style:italic; color:#5c3d0a; line-height:1.65;
    word-break:break-word;
  }
  .salmo-verso {
    font-family:'EB Garamond',serif; font-size:clamp(.98rem,3.5vw,1.05rem);
    line-height:1.85; color:var(--texto);
    padding:.3rem 0 .3rem .9rem;
    border-left:2px solid rgba(201,168,76,.25); margin-bottom:.4rem;
    word-break:break-word;
  }
  .aclamacao {
    text-align:center; font-family:'Cinzel',serif;
    color:var(--vermelho-lit); font-size:clamp(.72rem,2.8vw,.82rem); letter-spacing:.12em;
    padding:.6rem .5rem;
    border-top:1px solid rgba(192,57,43,.2); border-bottom:1px solid rgba(192,57,43,.2);
    margin:.5rem 0 1rem; word-break:break-word;
  }
  .palavra-final {
    text-align:right; font-family:'Cinzel',serif;
    font-size:clamp(.65rem,2.5vw,.72rem); letter-spacing:.08em; color:var(--dourado);
    margin-top:1.2rem; padding-top:.6rem;
    border-top:1px solid rgba(201,168,76,.3);
  }

  /* ── ORAÇÕES ── */
  .oracao-wrap { padding:1.4rem var(--pad) 1.8rem; }
  .oracao-label {
    font-family:'Cinzel',serif; font-size:clamp(.62rem,2.5vw,.68rem); letter-spacing:.13em;
    text-transform:uppercase; color:var(--dourado);
    margin-bottom:.5rem; margin-top:1.2rem;
  }
  .oracao-label:first-child { margin-top:0; }
  .oracao-texto {
    font-family:'EB Garamond',serif;
    font-size:clamp(1rem,4vw,1.05rem); line-height:1.9; color:var(--texto);
    word-break:break-word;
  }
  .antifona-box {
    background:var(--creme-escuro); border:1px solid rgba(201,168,76,.3);
    border-radius:6px; padding:.85rem 1rem; margin-bottom:.9rem;
  }

  /* ── CALENDÁRIO ── */
  .cal-grid {
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(130px,1fr));
    gap:.55rem; padding:1.3rem var(--pad);
  }
  .cal-pill {
    padding:.55rem .6rem; border-radius:8px; border:1px solid;
    font-size:clamp(.65rem,2.5vw,.72rem); font-family:'Cinzel',serif; font-weight:600;
    letter-spacing:.05em; text-align:center; word-break:break-word;
  }
  .cal-desc {
    padding:0 var(--pad) 1.5rem; font-family:'EB Garamond',serif;
    font-size:clamp(.95rem,3.5vw,1rem); line-height:1.85; color:#5c3d0a;
  }
  .cal-desc ul { padding-left:1.3rem; margin-top:.5rem; }
  .cal-desc li { margin-bottom:.25rem; word-break:break-word; }
  .cal-hoje {
    margin:1rem 0; padding:.8rem 1rem;
    border-left:3px solid; border-radius:0 6px 6px 0;
    font-family:'EB Garamond',serif; font-size:clamp(.95rem,3.5vw,1rem); font-style:italic;
    word-break:break-word;
  }

  /* ── FOOTER ── */
  .footer {
    background:#0d0500; border-top:2px solid var(--dourado);
    padding:1.1rem var(--pad); text-align:center;
  }
  .footer p {
    font-family:'EB Garamond',serif; font-size:clamp(.78rem,3vw,.85rem);
    color:rgba(201,168,76,.4); font-style:italic;
  }

  /* ── MOBILE FINO (<400px) ── */
  @media(max-width:400px){
    .sec-ref { display:none; }
    .cal-grid { grid-template-columns:1fr 1fr; }
    .header-liturgia { letter-spacing:.06em; }
  }
</style>
</head>
<body>
<div id="app">
  <div id="loading">
    <div class="spin">☧</div>
    <p>Buscando a liturgia do dia…</p>
  </div>
</div>
<script>
const ESTACOES = {
  roxo:    { label:'Quaresma / Advento',        cor:'#7B3FA0' },
  vermelho:{ label:'Espírito Santo / Mártires', cor:'#C0392B' },
  branco:  { label:'Natal / Tempo Pascal',      cor:'#C9A84C' },
  verde:   { label:'Tempo Comum',               cor:'#2E7D4F' },
  rosa:    { label:'Gaudete / Laetare',          cor:'#C27BA0' },
};
const TODAS = [
  { label:'Advento',       cor:'#7B5EA7' },
  { label:'Natal',         cor:'#C9A84C' },
  { label:'Tempo Comum',   cor:'#2E7D4F' },
  { label:'Quaresma',      cor:'#6B2D8B' },
  { label:'Tríduo Pascal', cor:'#C0392B' },
  { label:'Tempo Pascal',  cor:'#D4AF37' },
];

function estacao(cor) {
  return ESTACOES[(cor||'').toLowerCase().trim()] || ESTACOES.verde;
}

function parseTexto(txt) {
  if (!txt) return '';
  // Números de versículo colados ao texto: 21Jesus → <sup>21</sup>Jesus
  return txt.replace(/(\d{1,3})([A-ZÁÉÍÓÚÀÃÕÂÊÎÔÛÇ"«\u201c\-])/g,
    (_, n, c) => `<sup class="vnum">${n}</sup>${c}`);
}

function renderLeitura(l) {
  if (!l) return '<p style="color:#aaa;font-style:italic;font-family:\'EB Garamond\',serif">Não disponível.</p>';
  let h = '';
  if (l.titulo) h += `<p class="leitura-titulo">${l.titulo}</p>`;
  else if (l.referencia) h += `<p class="leitura-titulo">${l.referencia}</p>`;
  if (l.texto) h += `<div class="leitura-texto">${parseTexto(l.texto)}</div>`;
  h += `<div class="palavra-final">— Palavra do Senhor</div>`;
  return h;
}

function renderSalmo(s) {
  if (!s) return '<p style="color:#aaa;font-style:italic;font-family:\'EB Garamond\',serif">Não disponível.</p>';
  let h = '';
  if (s.referencia) h += `<p class="leitura-titulo">${s.referencia}</p>`;
  if (s.refrao)     h += `<div class="refrao">${s.refrao}</div>`;
  if (s.texto) {
    s.texto.split('\n').filter(v => v.trim()).forEach(v => {
      h += `<div class="salmo-verso">${parseTexto(v.trim())}</div>`;
    });
  }
  return h;
}

function renderEvangelho(e) {
  if (!e) return '<p style="color:#aaa;font-style:italic;font-family:\'EB Garamond\',serif">Não disponível.</p>';
  let h = '';
  if (e.titulo) h += `<p class="leitura-titulo">${e.titulo}</p>`;
  h += `<div class="aclamacao">✦ Glória e louvor a vós, ó Cristo! ✦</div>`;
  if (e.texto) h += `<div class="leitura-texto">${parseTexto(e.texto)}</div>`;
  h += `<div class="palavra-final">— Palavra da Salvação</div>`;
  return h;
}

let idx = 0;
function sec(titulo, ref, corpo, aberto) {
  idx++;
  const id = 's'+idx;
  return `<div class="section">
    <div class="sec-head" onclick="tog('${id}')">
      <div class="sec-num">${idx}</div>
      <div class="sec-title">${titulo}</div>
      ${ref ? `<div class="sec-ref">${ref}</div>` : ''}
      <div class="chevron ${aberto?'open':''}" id="ch-${id}"></div>
    </div>
    <div class="sec-body ${aberto?'open':''}" id="${id}">${corpo}</div>
  </div>`;
}

function tog(id) {
  document.getElementById(id).classList.toggle('open');
  document.getElementById('ch-'+id).classList.toggle('open');
}

function switchTab(t,p) {
  document.querySelectorAll('.tab').forEach(x=>x.classList.remove('active'));
  document.querySelectorAll('.tab-panel').forEach(x=>x.classList.remove('active'));
  document.getElementById(t).classList.add('active');
  document.getElementById(p).classList.add('active');
}

function build(d) {
  idx = 0;
  const est = estacao(d.cor);
  const l = d.leituras || {};
  const o = d.oracoes  || {};
  const a = d.antifonas|| {};

  const l1  = (l.primeiraLeitura||[])[0] || null;
  const sal = (l.salmo||[])[0]           || null;
  const l2  = (l.segundaLeitura||[])[0]  || null;
  const ev  = (l.evangelho||[])[0]       || null;

  // ABA 1 — PALAVRA
  let tabP = sec('Primeira Leitura', l1?.referencia||'', renderLeitura(l1), true);
  tabP += sec('Salmo Responsorial',  sal?.referencia||'', renderSalmo(sal),  false);
  if (l2) tabP += sec('Segunda Leitura', l2?.referencia||'', renderLeitura(l2), false);
  tabP += sec('Evangelho', ev?.referencia||'', renderEvangelho(ev), false);

  // ABA 2 — ORAÇÕES
  const orLabel = (t,txt) => txt
    ? `<p class="oracao-label">${t}</p><p class="oracao-texto">${txt}</p>` : '';
  const antif = (t,txt) => txt
    ? `<p class="oracao-label">${t}</p><div class="antifona-box"><p class="oracao-texto">${txt}</p></div>` : '';

  const tabO = `<div class="oracao-wrap">
    ${antif('Antífona de Entrada',   a.entrada)}
    ${antif('Antífona da Comunhão',  a.comunhao)}
    ${orLabel('Oração da Coleta',               o.coleta)}
    ${orLabel('Oração sobre as Oferendas',       o.oferendas)}
    ${orLabel('Oração após a Comunhão',          o.comunhao)}
  </div>`;

  // ABA 3 — CALENDÁRIO
  const tabC = `
    <div class="cal-grid">
      ${TODAS.map(e=>`<div class="cal-pill" style="background:${e.cor}22;border-color:${e.cor}66;color:${e.cor};">${e.label}</div>`).join('')}
    </div>
    <div class="cal-desc">
      <p>O <strong>Ano Litúrgico</strong> é o ciclo anual de celebrações da Igreja, organizado em torno dos mistérios de Cristo. Inicia no 1.º Domingo do Advento e conclui com a solenidade de Cristo Rei.</p>
      <ul>
        <li><strong>Advento</strong> — Preparação para a Natividade (roxo)</li>
        <li><strong>Natal</strong> — Celebração da Encarnação (branco)</li>
        <li><strong>Tempo Comum I</strong> — Missão pública de Jesus (verde)</li>
        <li><strong>Quaresma</strong> — Conversão e penitência (roxo)</li>
        <li><strong>Tríduo Pascal</strong> — Paixão, Morte e Ressurreição (vermelho/branco)</li>
        <li><strong>Tempo Pascal</strong> — 50 dias de alegria (branco/dourado)</li>
        <li><strong>Tempo Comum II</strong> — Crescimento da Igreja (verde)</li>
      </ul>
      <div class="cal-hoje" style="border-color:${est.cor};background:${est.cor}18;color:#5c3d0a;">
        Hoje — <em>${d.liturgia||''}</em> — tempo de cor <strong>${d.cor||''}</strong>: <em>${est.label}</em>.
      </div>
    </div>`;

  return `
  <div class="header">
    <div class="season-stripe" style="background:${est.cor};"></div>
    <div class="chi-rho">☧</div>
    <div class="header-liturgia">${d.liturgia||''}</div>
    <div class="header-data">${d.data||''}</div>
    <div class="header-badges">
      <span class="badge" style="background:${est.cor}22;border-color:${est.cor}66;color:${est.cor};">${est.label}</span>
      <span class="badge" style="background:rgba(201,168,76,.12);border-color:rgba(201,168,76,.35);color:#C9A84C;">Cor ${d.cor||''}</span>
    </div>
  </div>
  <div class="tabs">
    <div class="tab active" id="t1" onclick="switchTab('t1','p1')">Liturgia da Palavra</div>
    <div class="tab"        id="t2" onclick="switchTab('t2','p2')">Orações da Missa</div>
    <div class="tab"        id="t3" onclick="switchTab('t3','p3')">Calendário</div>
  </div>
  <div class="content">
    <div class="tab-panel active" id="p1">${tabP}</div>
    <div class="tab-panel"        id="p2">${tabO}</div>
    <div class="tab-panel"        id="p3">${tabC}</div>
  </div>
  <div class="footer">
    <p>Folheto Litúrgico Digital · Arquidiocese de São Paulo</p>
    <p style="margin-top:.3rem;font-size:.78rem;">Fonte: liturgia.up.railway.app</p>
  </div>`;
}

(async()=>{
  try {
    const res  = await fetch('https://liturgia.up.railway.app/v2/');
    if (!res.ok) throw new Error('HTTP '+res.status);
    const data = await res.json();
    document.getElementById('app').innerHTML = build(data);
  } catch(e) {
    document.getElementById('app').innerHTML = `
      <div style="background:#0d0500;border-bottom:3px solid #C9A84C;padding:2rem;text-align:center;">
        <div style="font-size:2.5rem;color:#C9A84C;">☧</div>
        <div style="font-family:'Cinzel',serif;color:#C9A84C;letter-spacing:.18em;margin-top:.5rem;font-size:.9rem;">FOLHETO LITÚRGICO</div>
      </div>
      <div style="background:#faf7f0;padding:2.5rem 2rem;text-align:center;">
        <p style="font-family:'EB Garamond',serif;font-size:1.1rem;color:#922;margin-bottom:.5rem;">Não foi possível carregar a liturgia.</p>
        <p style="font-family:monospace;font-size:.82rem;color:#c55;">${e.message}</p>
        <button onclick="location.reload()" style="margin-top:1.2rem;padding:.5rem 1.8rem;background:#C9A84C;color:#fff;border:none;border-radius:4px;cursor:pointer;font-family:'Cinzel',serif;font-size:.75rem;letter-spacing:.1em;">Tentar novamente</button>
      </div>`;
  }
})();
</script>
</body>
</html>
